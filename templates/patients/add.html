<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Patient - HealthBridge EMR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/futuristic-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-container {
            max-width: 900px;
            margin: 2rem auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease-out;
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        .form-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #5b73ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .form-control:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1), 0 0 20px rgba(0, 212, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        select.form-control {
            background: rgba(10, 10, 10, 0.8);
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2300d4ff' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 12px center;
            background-repeat: no-repeat;
            background-size: 16px;
            padding-right: 40px;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        select.form-control:focus {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2300d4ff' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
        }

        /* Additional browser-specific fixes for dropdown arrows */
        select.form-control::-ms-expand {
            display: none;
        }
        
        select.form-control {
            background-color: rgba(10, 10, 10, 0.8) !important;
        }

        select.form-control option {
            background: rgba(10, 10, 10, 0.95);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 2px 0;
        }

        select.form-control option:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        select.form-control option:checked {
            background: rgba(0, 212, 255, 0.3);
            color: #00d4ff;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #5b73ff);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
            background: linear-gradient(135deg, #5b73ff, #00d4ff);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transform: translateY(-2px);
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(0, 212, 255, 0.2);
        }

        .form-text {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 0.5rem;
        }

        .validation-message {
            font-size: 0.8rem;
            margin-top: 0.5rem;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .validation-success {
            color: #51cf66;
            background: rgba(81, 207, 102, 0.1);
            border: 1px solid rgba(81, 207, 102, 0.2);
        }

        .validation-error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            animation: fadeInUp 0.6s ease-out;
            animation-fill-mode: both;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }

        @media (max-width: 768px) {
            .form-container {
                margin: 1rem;
                padding: 2rem 1.5rem;
            }
            
            .form-header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            
            .form-actions {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-sidebar">
            <div class="sidebar-header">
                <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                    <img src="/static/logo.png" alt="HealthBridge Logo" style="width: 32px; height: 32px; object-fit: contain;">
                    <h4 style="margin: 0;">HealthBridge</h4>
                </div>
                <small>Doctor Portal</small>
            </div>
            <nav class="sidebar-nav">
                <a href="/enhanced/dashboard" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/patients/add" class="nav-link"><i class="fas fa-user-plus"></i> New Patient</a>
                <a href="/patients/" class="nav-link"><i class="fas fa-users"></i> Patients</a>
                <a href="/reports/" class="nav-link"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="/fhir/" class="nav-link"><i class="fas fa-database"></i> FHIR</a>
                <a href="/search-page" class="nav-link"><i class="fas fa-search"></i> Search Code</a>
                <a href="/diagnosis-page" class="nav-link"><i class="fas fa-save"></i> Save Diagnosis</a>
                <a href="/history-page" class="nav-link"><i class="fas fa-history"></i> Patient History</a>
                <hr style="border-color: rgba(0, 212, 255, 0.2); margin: 1rem 0;">
                <a href="/enhanced/logout" class="nav-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </div>

        <div class="main-content">
            <div class="top-navbar">
                <div>
                    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h5><i class="fas fa-user-plus"></i> Add New Patient</h5>
                </div>
                <div>
                    <a href="{{ url_for('patients.patient_list') }}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Back to Patients
                    </a>
                </div>
            </div>

            <div class="content-area">
                <div class="form-container">
                    <div class="form-header">
                        <h2 class="form-title"><i class="fas fa-user-plus"></i> Patient Registration</h2>
                    </div>

                    <form method="POST" id="patientForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="name" class="form-label">Full Name *</label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
                            <div class="form-group">
                                <label for="age" class="form-label">Age *</label>
                                <input type="number" class="form-control" id="age" name="age" min="0" max="150" required>
                            </div>
                            <div class="form-group">
                                <label for="gender" class="form-label">Gender *</label>
                                <select class="form-control" id="gender" name="gender" required>
                                    <option value="" disabled selected>Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="contact" class="form-label">Contact Number *</label>
                                <input type="tel" class="form-control" id="contact" name="contact" required>
                            </div>
                            <div class="form-group">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="address" class="form-label">Address</label>
                            <textarea class="form-control" id="address" name="address" rows="2"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="medical_history" class="form-label">Medical History</label>
                            <textarea class="form-control" id="medical_history" name="medical_history" rows="3" 
                                      placeholder="Previous conditions, surgeries, chronic diseases..."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="allergies" class="form-label">Allergies</label>
                            <textarea class="form-control" id="allergies" name="allergies" rows="2" 
                                      placeholder="Drug allergies, food allergies, environmental allergies..."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="abha_id" class="form-label">ABHA ID (Ayushman Bharat Health Account)</label>
                            <input type="text" class="form-control" id="abha_id" name="abha_id" 
                                   placeholder="14-digit ABHA ID (e.g., 12-3456-7890-1234)" maxlength="17">
                            <div class="form-text">
                                <i class="fas fa-info-circle"></i> ABHA ID should be 14 digits. Optional but recommended for government health schemes.
                            </div>
                            <div id="abha_feedback" class="validation-message" style="display: none;"></div>
                        </div>

                        <div class="form-actions">
                            <a href="{{ url_for('patients.patient_list') }}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Save Patient
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Mobile menu toggle
        function toggleMobileMenu() {
            const sidebar = document.querySelector('.dashboard-sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        // Form validation
        document.getElementById('patientForm').addEventListener('submit', function(e) {
            const name = document.getElementById('name').value.trim();
            const age = document.getElementById('age').value;
            const gender = document.getElementById('gender').value;
            const contact = document.getElementById('contact').value.trim();
            
            if (!name || !age || !gender || !contact) {
                e.preventDefault();
                showNotification('Please fill in all required fields (marked with *)', 'error');
                return false;
            }
            
            if (age < 0 || age > 150) {
                e.preventDefault();
                showNotification('Please enter a valid age between 0 and 150', 'error');
                return false;
            }
        });

        // Phone number formatting
        document.getElementById('contact').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 10) {
                value = value.substring(0, 10);
            }
            e.target.value = value;
        });

        // ABHA ID formatting and validation
        document.getElementById('abha_id').addEventListener('input', function(e) {
            let value = e.target.value.replace(/[^0-9-]/g, '');
            let digits = value.replace(/-/g, '');
            
            if (digits.length > 14) {
                digits = digits.substring(0, 14);
            }
            
            // Format with hyphens
            if (digits.length > 10) {
                value = digits.substring(0, 2) + '-' + digits.substring(2, 6) + '-' + digits.substring(6, 10) + '-' + digits.substring(10);
            } else if (digits.length > 6) {
                value = digits.substring(0, 2) + '-' + digits.substring(2, 6) + '-' + digits.substring(6);
            } else if (digits.length > 2) {
                value = digits.substring(0, 2) + '-' + digits.substring(2);
            } else {
                value = digits;
            }
            
            e.target.value = value;
            
            // Validation feedback
            const feedback = document.getElementById('abha_feedback');
            if (digits.length === 14) {
                feedback.textContent = '✓ Valid ABHA ID format';
                feedback.className = 'validation-message validation-success';
                feedback.style.display = 'block';
            } else if (digits.length > 0) {
                feedback.textContent = 'ABHA ID must be 14 digits';
                feedback.className = 'validation-message validation-error';
                feedback.style.display = 'block';
            } else {
                feedback.style.display = 'none';
            }
        });

        // Notification system
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 1rem 1.5rem;
                border-radius: 12px;
                color: white;
                font-weight: 500;
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
                ${type === 'error' ? 
                    'background: rgba(255, 107, 107, 0.9); border: 1px solid #ff6b6b;' : 
                    'background: rgba(81, 207, 102, 0.9); border: 1px solid #51cf66;'
                }
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Add slide-in animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
        `;
        document.head.appendChild(style);
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
