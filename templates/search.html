<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Medical Codes - HealthBridge EMR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/futuristic-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .search-container {
            max-width: 1200px;
            margin: 2rem auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease-out;
            position: relative;
        }

        .search-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        .search-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #5b73ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .back-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.1);
        }

        .search-form {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1.5rem;
            margin-bottom: 2rem;
            align-items: end;
        }

        .search-input-group {
            display: flex;
            flex-direction: column;
        }

        .search-label {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-input {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .search-input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1), 0 0 25px rgba(0, 212, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-btn {
            padding: 16px 32px;
            background: linear-gradient(135deg, #00d4ff, #5b73ff);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .search-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 212, 255, 0.4);
            background: linear-gradient(135deg, #5b73ff, #00d4ff);
        }

        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            color: #00d4ff;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .results-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .results-header {
            padding: 1.5rem;
            background: rgba(0, 212, 255, 0.1);
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        .results-header.namaste {
            background: rgba(0, 212, 255, 0.1);
        }

        .results-header.icd11 {
            background: rgba(81, 207, 102, 0.1);
        }

        .results-title {
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .results-table {
            width: 100%;
            color: white;
        }

        .results-table th {
            background: rgba(0, 0, 0, 0.2);
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 1rem;
            border: none;
        }

        .results-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
        }

        .results-table tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        .code-badge {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
        }

        .code-badge.icd11 {
            background: rgba(81, 207, 102, 0.2);
            color: #51cf66;
        }

        .system-badge {
            background: linear-gradient(135deg, #00d4ff, #5b73ff);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .system-badge.icd11 {
            background: linear-gradient(135deg, #51cf66, #40c057);
        }

        .translate-btn {
            padding: 6px 12px;
            background: linear-gradient(135deg, #ffd43b, #fab005);
            border: none;
            border-radius: 15px;
            color: #333;
            font-weight: 500;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .translate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 212, 59, 0.4);
        }

        .no-results {
            text-align: center;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.6);
            font-style: italic;
        }

        .error-message {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
        }

        .translation-section {
            margin-top: 2rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 212, 59, 0.3);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .translation-header {
            padding: 1.5rem;
            background: rgba(255, 212, 59, 0.1);
            border-bottom: 1px solid rgba(255, 212, 59, 0.2);
        }

        .translation-content {
            padding: 1.5rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .search-container {
                margin: 1rem;
                padding: 2rem 1.5rem;
            }
            
            .search-form {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .results-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            
            .search-header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-sidebar">
            <div class="sidebar-header">
                <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                    <img src="/static/logo.png" alt="HealthBridge Logo" style="width: 32px; height: 32px; object-fit: contain;">
                    <h4 style="margin: 0;">HealthBridge</h4>
                </div>
                <small>Doctor Portal</small>
            </div>
            <nav class="sidebar-nav">
                <a href="/enhanced/dashboard" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/patients/add" class="nav-link"><i class="fas fa-user-plus"></i> New Patient</a>
                <a href="/patients/" class="nav-link"><i class="fas fa-users"></i> Patients</a>
                <a href="/reports/" class="nav-link"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="/fhir/" class="nav-link"><i class="fas fa-database"></i> FHIR</a>
                <a href="/search-page" class="nav-link"><i class="fas fa-search"></i> Search Code</a>
                <a href="/diagnosis-page" class="nav-link"><i class="fas fa-save"></i> Save Diagnosis</a>
                <a href="/history-page" class="nav-link"><i class="fas fa-history"></i> Patient History</a>
                <hr style="border-color: rgba(0, 212, 255, 0.2); margin: 1rem 0;">
                <a href="/enhanced/logout" class="nav-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </div>

        <div class="main-content">
            <div class="top-navbar">
                <div>
                    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h5><i class="fas fa-search"></i> Search Medical Codes</h5>
                </div>
            </div>

            <div class="content-area">
                <div class="search-container">
                    <div class="search-header">
                        <h2 class="search-title"><i class="fas fa-search"></i> Medical Code Search</h2>
                        <a href="javascript:history.back()" class="back-btn">
                            <i class="fas fa-arrow-left"></i> Back
                        </a>
                    </div>

                    <div class="search-form">
                        <div class="search-input-group">
                            <label class="search-label">Enter Symptom or Condition</label>
                            <input type="text" class="search-input" id="symptomInput" 
                                   placeholder="e.g., fever, cough, diabetes, jwara, kasa">
                        </div>
                        <button class="search-btn" onclick="searchCodes()">
                            <i class="fas fa-search"></i> Search Codes
                        </button>
                    </div>

                    <div id="loadingSpinner" class="loading-spinner" style="display: none;">
                        <div class="spinner"></div>
                    </div>

                    <div id="results" style="display: none;">
                        <div class="results-grid">
                            <div class="results-card">
                                <div class="results-header namaste">
                                    <h5 class="results-title">
                                        <i class="fas fa-leaf"></i> NAMASTE Codes (AYUSH)
                                        <span id="namasteSourceBadge" class="system-badge" style="font-size: 0.7rem; margin-left: 0.5rem;"></span>
                                    </h5>
                                </div>
                                <table class="results-table">
                                    <thead>
                                        <tr>
                                            <th>Code</th>
                                            <th>Name</th>
                                            <th>System</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="namasteResults"></tbody>
                                </table>
                            </div>

                            <div class="results-card">
                                <div class="results-header icd11">
                                    <h5 class="results-title">
                                        <i class="fas fa-globe"></i> ICD-11 Codes (WHO)
                                    </h5>
                                </div>
                                <table class="results-table">
                                    <thead>
                                        <tr>
                                            <th>Code</th>
                                            <th>Name</th>
                                            <th>Category</th>
                                        </tr>
                                    </thead>
                                    <tbody id="icd11Results"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div id="errorMessage" class="error-message" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Mobile menu toggle
        function toggleMobileMenu() {
            const sidebar = document.querySelector('.dashboard-sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        async function searchCodes() {
            const symptom = document.getElementById('symptomInput').value.trim();
            if (!symptom) {
                showError('Please enter a symptom');
                return;
            }

            document.getElementById('loadingSpinner').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';

            try {
                const response = await fetch(`/search?q=${encodeURIComponent(symptom)}`);
                const data = await response.json();

                if (response.ok) {
                    displayResults(data);
                } else {
                    showError(data.error || 'Search failed');
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            } finally {
                document.getElementById('loadingSpinner').style.display = 'none';
            }
        }

        function displayResults(data) {
            const namasteTable = document.getElementById('namasteResults');
            const icd11Table = document.getElementById('icd11Results');
            
            namasteTable.innerHTML = '';
            icd11Table.innerHTML = '';

            // Update NAMASTE source badge
            const sourceBadge = document.getElementById('namasteSourceBadge');
            if (data.namaste_source === 'api') {
                sourceBadge.textContent = 'Official API';
                sourceBadge.style.background = 'linear-gradient(135deg, #51cf66, #40c057)';
            } else {
                sourceBadge.textContent = 'Demo Data';
                sourceBadge.style.background = 'linear-gradient(135deg, #ffd43b, #fab005)';
            }
            sourceBadge.title = data.namaste_message || '';

            // Display NAMASTE results
            if (data.namaste && data.namaste.length > 0) {
                data.namaste.forEach(item => {
                    const row = `<tr>
                        <td><span class="code-badge">${item.code}</span></td>
                        <td>${item.name}</td>
                        <td><span class="system-badge">${item.system}</span></td>
                        <td><button class="translate-btn" onclick="translateCodeNew('${item.code}', '${item.name}', 'namaste')">
                            <i class="fas fa-exchange-alt"></i> Translate
                        </button></td>
                    </tr>`;
                    namasteTable.innerHTML += row;
                });
            } else {
                namasteTable.innerHTML = '<tr><td colspan="4" class="no-results">No NAMASTE results found</td></tr>';
            }

            // Display ICD-11 results
            if (data.icd11 && data.icd11.length > 0) {
                data.icd11.forEach(item => {
                    const row = `<tr>
                        <td><span class="code-badge icd11">${item.code}</span></td>
                        <td>${item.name}</td>
                        <td><span class="system-badge icd11">${item.category}</span></td>
                    </tr>`;
                    icd11Table.innerHTML += row;
                });
            } else {
                icd11Table.innerHTML = '<tr><td colspan="3" class="no-results">No ICD-11 results found</td></tr>';
            }

            document.getElementById('results').style.display = 'block';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        async function translateCodeNew(code, name, system) {
            // Show translation section
            if (!document.getElementById('translationSection')) {
                const translationHTML = `
                    <div id="translationSection" class="translation-section">
                        <div class="translation-header">
                            <h5 class="results-title" style="color: #ffd43b;">
                                <i class="fas fa-exchange-alt"></i> Code Translation
                            </h5>
                        </div>
                        <div class="translation-content">
                            <div id="translationResults"></div>
                        </div>
                    </div>
                `;
                document.getElementById('results').insertAdjacentHTML('afterend', translationHTML);
            }
            
            const resultsDiv = document.getElementById('translationResults');
            resultsDiv.innerHTML = `
                <p>Translating <span class="code-badge">${code}</span> - ${name}...</p>
                <div class="loading-spinner">
                    <div class="spinner" style="width: 30px; height: 30px;"></div>
                </div>
            `;
            
            try {
                const response = await fetch(`/translate_code?code=${encodeURIComponent(code)}&system=${system}`);
                const data = await response.json();
                
                if (data.success) {
                    resultsDiv.innerHTML = `
                        <div style="background: rgba(81, 207, 102, 0.1); border: 1px solid rgba(81, 207, 102, 0.2); padding: 1rem; border-radius: 12px;">
                            <h6>Source: <span class="code-badge">${data.source.code}</span> - ${data.source.name} (${data.source.system})</h6>
                            <h6 style="margin-top: 1rem;">Translation:</h6>
                            <div style="margin-top: 0.5rem; padding: 0.75rem; background: rgba(81, 207, 102, 0.05); border-radius: 8px;">
                                <span class="code-badge ${data.target.system.toLowerCase()}">${data.target.code}</span>
                                <span style="margin-left: 0.5rem;">${data.target.name} (${data.target.system})</span>
                            </div>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `
                        <div style="background: rgba(255, 212, 59, 0.1); border: 1px solid rgba(255, 212, 59, 0.2); padding: 1rem; border-radius: 12px; color: #ffd43b;">
                            ${data.message}
                        </div>
                    `;
                }
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="error-message">
                        Translation failed: ${error.message}
                    </div>
                `;
            }
        }

        async function translateCode(code, name) {
            // Show translation section
            if (!document.getElementById('translationSection')) {
                const translationHTML = `
                    <div id="translationSection" class="translation-section">
                        <div class="translation-header">
                            <h5 class="results-title" style="color: #ffd43b;">
                                <i class="fas fa-exchange-alt"></i> Translation (NAMASTE ↔ ICD-11)
                            </h5>
                        </div>
                        <div class="translation-content">
                            <div id="translationResults"></div>
                        </div>
                    </div>
                `;
                document.getElementById('results').insertAdjacentHTML('afterend', translationHTML);
            }
            
            const resultsDiv = document.getElementById('translationResults');
            resultsDiv.innerHTML = `
                <p>Translating <span class="code-badge">${code}</span> - ${name}...</p>
                <div class="loading-spinner">
                    <div class="spinner" style="width: 30px; height: 30px;"></div>
                </div>
            `;
            
            try {
                const response = await fetch(`/conceptmap/translate?code=${encodeURIComponent(code)}`);
                const data = await response.json();
                
                if (data.parameter) {
                    let matches = [];
                    data.parameter.forEach(param => {
                        if (param.name === 'match') {
                            const match = {};
                            param.part.forEach(part => {
                                if (part.name === 'concept') {
                                    match.code = part.valueCoding.code;
                                    match.display = part.valueCoding.display;
                                }
                            });
                            matches.push(match);
                        }
                    });
                    
                    if (matches.length > 0) {
                        resultsDiv.innerHTML = `
                            <div style="background: rgba(81, 207, 102, 0.1); border: 1px solid rgba(81, 207, 102, 0.2); padding: 1rem; border-radius: 12px;">
                                <h6>Source: <span class="code-badge">${code}</span> - ${name}</h6>
                                <h6 style="margin-top: 1rem;">ICD-11 Translation:</h6>
                                ${matches.map(match => `
                                    <div style="margin-top: 0.5rem; padding: 0.75rem; background: rgba(81, 207, 102, 0.05); border-radius: 8px;">
                                        <span class="code-badge icd11">${match.code}</span>
                                        <span style="margin-left: 0.5rem;">${match.display}</span>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    } else {
                        resultsDiv.innerHTML = `
                            <div style="background: rgba(255, 212, 59, 0.1); border: 1px solid rgba(255, 212, 59, 0.2); padding: 1rem; border-radius: 12px; color: #ffd43b;">
                                No ICD-11 translation found for <span class="code-badge">${code}</span>
                            </div>
                        `;
                    }
                }
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="error-message">
                        Translation failed. Please try again.
                    </div>
                `;
            }
        }

        // Enter key search
        document.getElementById('symptomInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchCodes();
            }
        });
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
